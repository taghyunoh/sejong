<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="/bootstrap/css/bootstrap.css" rel="stylesheet">

  <link href="/asset/css/common.css" rel="stylesheet">
  <link href="login.css" rel="stylesheet">

  <title>로그인</title>
</head>

<body>
  <!-- 부트스트랩 js -->
  <script src="/bootstrap/js/bootstrap.bundle.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <div id="login" class="container">

    <div class="login-box">
      <div class="login-wrap">
        <h1>AI 기반 디지털 헬스케어 서비스 플랫폼 실증</h1>
        <div class="id-box w-100">
          <input class="form-control" type="text" id="inputUserID" placeholder="사용자ID" aria-label="사용자ID">
          <input type="password" class="form-control mt-3" id="inputPassword" placeholder="비밀번호">
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">로그인</button>
        <div class="set-btn-box w-100 mt-3">
          <button type="button" class="btn btn-outline-dark">비밀번호 초기화</button>
          <button type="button" class="btn btn-outline-dark">비밀번호 변경</button>
        </div>
      </div>
      <div class="img-wrap">
        <img src="/asset/img/login_bg_02.png" alt="">
      </div>
    </div>

  </div>

</body>

</html>

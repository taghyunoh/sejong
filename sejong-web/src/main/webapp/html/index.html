  <script>
    $(document).ready(function () {
      // 데이트피커 단일
      $('input[name = dates]').daterangepicker({
        singleDatePicker: true,
        showDropdowns: true,
        minYear: 1901,
        maxYear: 9999,
        locale: {
          format: 'YYYY-MM-DD',
          separator: " ~ ",
          applyLabel: "확인",
          cancelLabel: "취소",
          fromLabel: "From",
          toLabel: "To",
          customRangeLabel: "Custom",
          weekLabel: "주",
          daysOfWeek: [
            "일", "월", "화", "수", "목", "금", "토"
          ],
          monthNames: [
            "1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"
          ],
          firstDay: 1,
        },
      }, function (start, end, label) {
        // var years = moment().diff(start, 'years');
      });

      // 데이트피커 범위
      // $('input[name = "dates"]').daterangepicker({
      //   "minYear": 1000,
      //   "maxYear": 9999,
      //   "locale": {
      //     "format": 'YYYY-MM-DD',
      //     "separator": " ~ ",

      //     "cancelLabel": "취소",

      //     ],

      //       "1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"
      //     ],
      //     "firstDay": 1
      //   },
      // }, function (start, end, label) {
      //   console.log('New date range selected: ' + start.format('YYYY-MM-DD') + ' to ' + end.format('YYYY-MM-DD') + ' (predefined range: ' + label + ')');
      // });

      // 년월 데이트피커
      // 실제로 보여지는 날짜를 정의.
      $('#txt-work-month').text(new Date().getFullYear() + '년 ' + (new Date().getMonth() + 1) + '월');
      // monthpicker 에서 사용할 초기 날짜 정의
      $('.monthpicker').val(new Date().getFullYear() + '-' + (new Date().getMonth() + 1));

      // monthpicker 적용
      $('.monthpicker').bootstrapMonthpicker({
        // from: '2014-05',
        // to: '2014-10',
        // 달을 선택한 다음의 이벤트 정의 
        onSelect: function (value) {
          var workMonthStr = '';
          /* 
          * monthpicker 라이브러리에서 기본으로 "-" 를 사용
          **************************************/
          var splitDate = $.trim(value).split("-");

          // 표한하고 싶으신 포맷으로 알아서 정의하시면 됩니다.
          $.each(splitDate, function (_idx, _date) {
            if (_idx == 0)
              workMonthStr += _date + '년 ';
            if (_idx == 1)
              workMonthStr += _date + '월';
          });

          // 표시
          $('#txt-work-month').text(workMonthStr);
        }
      });
      // #choice-work-month 에 monthpicker 이벤트 정의
      $('#choice-work-month').click(function () {
        $('.monthpicker').click();
      });

    });
  </script>

  <ul class="nav nav-tabs" id="tab-list">
    <!-- 메뉴 선택시 탭 제목 불러오는 영역 -->
  </ul>

  <div class="tab-content">
    <!-- 메뉴 선택시 탭 컨텐츠 불러오는 영역 -->

  </div>

  <script>
    $(document).ready(function () {


      // 메뉴 클릭시 탭 생성
      $('.menu-item a').on('click', function (e) {

        e.preventDefault();
        var menuText = $(this).text();
        var menuId = $(this).closest('.menu-item').data('menu');

        // 만약 클릭한 메뉴가 이미 열려있는 탭이면 해당 탭을 활성화
        for (let i = 0; i < $('.nav-link').length; i++) {
          if ($('.nav-link').eq(i).text() == menuText) {
            $('#tab-list').find('.nav-link').removeClass('active');
            $('.tab-content').children().removeClass('active');
            $('.nav-link').eq(i).addClass('active')
            $('.tab-pane').eq(i).addClass('active')
            return;
          }
        }

        $('#tab-list').find('.nav-link').removeClass('active');
        $('.tab-content').children().removeClass('active');

        // 닫기 버튼을 추가하고 해당 버튼에 close 클래스 부여
        $('#tab-list').append('<li class="nav-item"><a class="nav-link active" href="#">' + menuText +
          '<button class="buttcon close"><span class="icon icon-close"></span></button>' + '</a></li>');
        // $('.tab-content').append('<div class="tab-pane active"><p>' + menuText + ' 화면 입니다.</p></div>');

        for (let i = 0; i < $('.nav-link').length; i++) {
          TabOpen(i);
        }

        // 새로 생성된 탭의 tab-content 영역에 문서를 로드
        // 누른 메뉴의 name값을 가져와서 해당하는 html 파일을 불러옴
        var loadName = $(this).attr('name');
        var cate = $(this).data('cate');
        console.log('/html/' + cate + '/' + loadName + '.html');
        $.ajax({
          url: '/html/' + cate + '/' + loadName + '.html',
          type: 'GET',
          dataType: 'html',
          success: function (data) {
            $('.tab-content').append(data);
          }
        });

      });

      // 탭 열기
      function TabOpen(e) {
        $('.nav-link').eq(e).click(function () {
          $('#tab-list').find('.nav-link').removeClass('active');
          $('.tab-content').children().removeClass('active');
          $('.nav-link').eq(e).addClass('active')
          $('.tab-pane').eq(e).addClass('active')
        });
      }


      // 탭 닫기 버튼 클릭 시,
      $('#tab-list').on('click', '.nav-item .close', function (e) {
        e.preventDefault();
        var tabId = $(this).closest('.nav-item').index();

        // 닫기 버튼을 클릭한 탭을 제거
        $('.nav-link').eq(tabId).closest('.nav-item').remove();
        $('.tab-pane').eq(tabId).remove();

        // 현재 보고 있는 탭이 제거되었을 때만 맨 앞 탭을 활성화
        if ($('.nav-link.active').length === 0) {
          $('.nav-link').eq(0).addClass('active');
          $('.tab-pane').eq(0).addClass('active');
        }
      });



      // 그리드의 삭제버튼 클릭시 체크박스 체크된 항목 삭제 
      $('#rowDel01').on('click', function () {
        $('#gridTable01 tbody tr').each(function () {
          if ($(this).find('input[type="checkbox"]').is(':checked')) {
            $(this).remove();
          }
        });
      });
      $('#rowDel02').on('click', function () {
        $('#gridTable02 tbody tr').each(function () {
          if ($(this).find('input[type="checkbox"]').is(':checked')) {
            $(this).remove();
          }
        });
      });

      // 그리드의 삭제버튼 클릭시 체크박스 체크된 항목이 없으면 toast 메시지 출력
      $('.del').on('click', function () {
        if ($('input[type="checkbox"]:checked').length === 0) {
          $('.toast').toast('show');
          $('.toast-body').text('삭제할 항목을 선택하세요.');
        }
      });

      // 그리드의 체크박스 체크상태일때 tr 배경색 변경
      $('input[type="checkbox"]').change(function () {
        if ($(this).is(":checked")) {
          $(this).closest('tr').addClass('tr-primary');
        } else {
          $(this).closest('tr').removeClass('tr-primary');
        }
      });

    });
  </script>
